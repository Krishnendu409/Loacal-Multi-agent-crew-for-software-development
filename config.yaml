# Local Multi-Agent Software Development Crew - Configuration
# Adjust these settings to suit your hardware and preferences.

llm:
  # Global fallback model. Per-role routing below takes priority.
  # Recommended free models (install via `ollama pull <model>`):
  #   - qwen2.5:7b-instruct
  #   - deepseek-coder:6.7b
  #   - phi3:mini
  model: phi3:mini
  # Ollama server URL (default local)
  base_url: http://localhost:11434
  # Retry and timeout controls (for constrained laptops)
  retries: 0
  timeout_seconds: 600
  # Enforce a strict three-model setup
  allowed_models:
    - qwen2.5:7b-instruct
    - deepseek-coder:6.7b
    - phi3:mini
  # Generation options
  options:
    temperature: 0.4
    num_predict: 512
  # Role-specific model routing (keeps same team structure, better local quality)
  routing:
    ceo_planner: phi3:mini
    market_researcher: phi3:mini
    customer_support_feedback_analyst: phi3:mini
    product_manager: phi3:mini
    compliance_privacy_specialist: phi3:mini
    architect: phi3:mini
    ui_ux_designer: phi3:mini
    database_engineer: phi3:mini
    api_integration_engineer: phi3:mini
    frontend_developer: phi3:mini
    backend_developer: phi3:mini
    data_analytics_engineer: phi3:mini
    performance_engineer: phi3:mini
    security_engineer: phi3:mini
    qa_engineer: phi3:mini
    code_reviewer: phi3:mini
    technical_writer: phi3:mini
    sre_reliability_engineer: phi3:mini
    release_manager: phi3:mini
    devops_engineer: phi3:mini
  # Fallbacks used if the primary model fails for a role
  fallbacks: {}
  # Optional per-role generation tuning
  role_options: {}
  # Optional retry strategy by role (overrides llm.retries)
  role_retries: {}

agents:
  # Toggle which agents participate in the crew
  ceo_planner: true
  market_researcher: true
  customer_support_feedback_analyst: true
  product_manager: true
  compliance_privacy_specialist: true
  architect: true
  ui_ux_designer: true
  database_engineer: true
  api_integration_engineer: true
  frontend_developer: true
  backend_developer: true
  data_analytics_engineer: true
  performance_engineer: true
  security_engineer: true
  qa_engineer: true
  code_reviewer: true
  technical_writer: true
  sre_reliability_engineer: true
  release_manager: true
  devops_engineer: false   # optional – enable for deployment configs

output:
  # Where to save the generated artifacts
  directory: output
  # Save each agent's response as a separate file
  save_individual_responses: true
  # Save the final compiled report
  save_final_report: true

crew:
  # Strategy gate + remediation pass: planning -> approval -> build -> QA/Reviewer -> fix
  max_fix_iterations: 0
  stop_on_no_major_issues: true
  require_strategy_approval: true
  # Which checklist severities should force a fix pass
  blocking_severities: [critical, major]
  # Optional cited research context injected into each role prompt
  research_mode: false
  research_urls: []
  research_timeout_seconds: 10
  research_max_chars_per_source: 2000

skills:
  # Enable built-in role skill packs and shared communication standards
  include_default_role_skills: true
  # Force consistent handoff sections between agents
  enforce_handoff_sections: true
  # Strict validation for unknown skill references in include/exclude rules
  strict_mode: false
  # Prompt budget guardrail: keep top-priority skills when list is too long
  max_skills_per_agent: 12
  # External imported skill packs
  packs:
    ecc:
      enabled: true
      profile: starter   # starter | advanced
  # Shared skills injected into every role
  shared:
    - structured communication
    - security-first thinking
    - verification mindset
    - documentation discipline
  # Optional per-role additions (keys match the `agents` section)
  per_role:
    customer_support_feedback_analyst: [support signal prioritization]
    compliance_privacy_specialist: [privacy impact thinking]
    ui_ux_designer: [interaction design and prototype clarity]
    database_engineer: [schema evolution safety]
    api_integration_engineer: [resilient integration contracts]
    frontend_developer: [ui consistency and accessibility]
    backend_developer: [dependency hygiene]
    data_analytics_engineer: [measurement reliability]
    performance_engineer: [evidence-driven optimization]
    security_engineer: [threat-led validation]
    qa_engineer: [risk-based test prioritization]
    technical_writer: [high-signal operational documentation]
    sre_reliability_engineer: [slo-first reliability planning]
    release_manager: [go-no-go discipline]
  # Optional global and per-role explicit includes
  include: []
  per_role_include: {}
  # Optional global and per-role explicit exclusions
  exclude: []
  per_role_exclude: {}
